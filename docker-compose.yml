services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: secbleau
      POSTGRES_PASSWORD: secbleau
      POSTGRES_DB: secbleau
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secbleau"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://secbleau:secbleau@db:5432/secbleau
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      # boolder-data/ is a host-side cache — survives container rebuilds and restarts.
      # The import script stores downloaded GeoJSON and a version stamp here.
      - ./backend/data/boolder-data:/app/data/boolder-data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  pgdata:

